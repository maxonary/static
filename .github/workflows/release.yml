name: Build, Sign & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-sign-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches Info.plist version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "Static/Info.plist")
          if [ "$TAG_VERSION" != "$PLIST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Info.plist version ($PLIST_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Build
        run: |
          xcodebuild -project "Static.xcodeproj" \
            -scheme "Static" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--options=runtime --timestamp" \
            clean build

      - name: Zip app
        run: |
          APP_PATH="build/Build/Products/Release/Static.app"
          ditto -c -k --keepParent "$APP_PATH" "Static.app.zip"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMIT_OUTPUT=$(xcrun notarytool submit "Static.app.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -m1 'id:' | awk '{print $2}')
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

      - name: Staple
        run: |
          # Unzip, staple, re-zip (retry up to 5 times for ticket propagation)
          ditto -x -k "Static.app.zip" staging
          for i in 1 2 3 4 5; do
            if xcrun stapler staple "staging/Static.app"; then
              echo "Staple succeeded on attempt $i"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "::error::Stapling failed after 5 attempts"
              exit 1
            fi
            echo "Staple attempt $i failed, waiting 30s for ticket propagation..."
            sleep 30
          done
          rm "Static.app.zip"
          ditto -c -k --keepParent "staging/Static.app" "Static.app.zip"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload to existing release, or create one if it doesn't exist
          gh release upload "$GITHUB_REF_NAME" \
            "Static.app.zip" \
            --clobber \
          || gh release create "$GITHUB_REF_NAME" \
            "Static.app.zip" \
            --title "Static ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
